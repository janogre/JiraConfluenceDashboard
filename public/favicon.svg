<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f3d2e"/>

  <!-- Outer triangle edges -->
  <line x1="16" y1="5" x2="25" y2="23" stroke="#95c672" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <line x1="16" y1="5" x2="7" y2="23" stroke="#95c672" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <line x1="7" y1="23" x2="25" y2="23" stroke="#95c672" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

  <!-- Spokes from center -->
  <line x1="16" y1="14" x2="16" y2="5" stroke="#95c672" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="16" y1="14" x2="25" y2="23" stroke="#95c672" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="16" y1="14" x2="7" y2="23" stroke="#95c672" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>

  <!-- Satellite nodes -->
  <circle cx="16" cy="5" r="2.5" fill="#95c672"/>
  <circle cx="25" cy="23" r="2.5" fill="#95c672"/>
  <circle cx="7" cy="23" r="2.5" fill="#95c672"/>

  <!-- Center hub -->
  <circle cx="16" cy="14" r="4" fill="#95c672"/>
  <circle cx="16" cy="14" r="2" fill="#0f3d2e"/>
</svg>
